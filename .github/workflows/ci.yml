name: CI/CD Pipeline

# Eventos que disparan el workflow
on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

# Variables de entorno globales
env:
  FLASK_ENV: testing
  SECRET_KEY: test-secret-key
  DATABASE_URL: sqlite:///:memory:

jobs:
  # Job 1: Pruebas y calidad de código
  test:
    name: 🧪 Tests y Calidad
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: [3.9, 3.11]
    
    steps:
      # 1. Checkout del código
      - name: 📥 Checkout código
        uses: actions/checkout@v3
      
      # 2. Configurar Python
      - name: 🐍 Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest-cov
      
      # 4. Verificar formato con Black
      - name: 🔍 Verificar formato (Black)
        run: |
          black --check app/ tests/
        continue-on-error: true
      
      # 5. Linting con Flake8
      - name: 🔎 Linting con Flake8
        run: |
          flake8 app/ tests/ --count --max-complexity=10 --statistics
      
      # 6. Ejecutar pruebas con cobertura
      - name: 🧪 Ejecutar pruebas
        run: |
          pytest --cov=app --cov-report=xml --cov-report=html tests/
      
      # 7. Subir reporte de cobertura
      - name: 📊 Subir cobertura a Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true
      
      # 8. Archivar reportes de prueba
      - name: 📎 Archivar reportes
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-reports-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.xml
            .pytest_cache/

  # Job 2: Construir imagen Docker
  build:
    name: 🐳 Construir imagen Docker
    runs-on: ubuntu-latest
    needs: test  # Solo ejecuta si los tests pasan
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v3
      
      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: 🔑 Login a DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
        continue-on-error: true  # No falla si no hay credenciales
      
      - name: 🏷️ Extraer metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/academica
            ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,format=short
      
      - name: 🐳 Construir imagen Docker
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false  # No push por ahora
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: 🔍 Escanear vulnerabilidades
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'academica:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # Job 3: Despliegue (solo en main)
  deploy:
    name: 🚀 Desplegar a producción
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v3
      
      - name: 🚀 Simular despliegue
        run: |
          echo "✅ Desplegando versión: ${{ github.sha }}"
          echo "🌍 Entorno: Producción"
          echo "📅 Fecha: $(date)"
          # Aquí irían los comandos reales de despliegue
          # Por ejemplo: scp, rsync, kubectl, etc.
      
      - name: 📱 Notificar éxito
        run: |
          echo "🎉 Despliegue completado exitosamente"