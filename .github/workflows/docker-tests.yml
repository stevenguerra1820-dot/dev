name: Docker Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  docker-test:
    name: 🐳 Pruebas con Docker Compose
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout código
        uses: actions/checkout@v3
      
      - name: 🐳 Configurar Docker
        uses: docker/setup-buildx-action@v2
      
      - name: 🔧 Levantar servicios con Docker Compose
        run: |
          docker-compose up -d db
          sleep 10  # Esperar a que PostgreSQL inicie
          docker-compose up -d web
      
      - name: ⏳ Esperar a que la app esté lista
        run: |
          timeout 30s bash -c 'until curl -f http://localhost:5000/api/; do sleep 2; done'
          echo "✅ App lista!"
      
      - name: 🧪 Ejecutar pruebas en contenedor
        run: |
          docker-compose exec -T web pytest --cov=app tests/
      
      - name: 📊 Verificar logs
        if: always()
        run: |
          docker-compose logs web --tail=50
      
      - name: 🧹 Limpiar
        if: always()
        run: |
          docker-compose down -v